server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json;

    location ~* \.(js|css)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "public, max-age=3600";
    }

    # ── Contact form ─────────────────────────────────────────
    # proxy_pass_request_headers on  ensures X-Requested-With is forwarded.
    # Flask needs that header to return JSON instead of a redirect.
    location = /submit {
        proxy_pass                 http://backend:5000/submit;
        proxy_http_version         1.1;
        proxy_set_header           Host              $host;
        proxy_set_header           X-Real-IP         $remote_addr;
        proxy_set_header           X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header           X-Forwarded-Proto $scheme;
        proxy_pass_request_headers on;
        proxy_redirect             off;
        proxy_connect_timeout      60s;
        proxy_send_timeout         60s;
        proxy_read_timeout         60s;
    }

    # ── Admin panel ──────────────────────────────────────────
    location /admin {
        proxy_pass                 http://backend:5000/admin;
        proxy_http_version         1.1;
        proxy_set_header           Host              $host;
        proxy_set_header           X-Real-IP         $remote_addr;
        proxy_set_header           X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header           X-Forwarded-Proto $scheme;
        proxy_pass_request_headers on;
        proxy_redirect             off;
        proxy_cookie_path          / /;
    }

    # ── Health check ─────────────────────────────────────────
    location = /health {
        proxy_pass       http://backend:5000/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header       Cache-Control "no-cache";
    }

    add_header X-Frame-Options        "SAMEORIGIN"    always;
    add_header X-Content-Type-Options "nosniff"       always;
    add_header X-XSS-Protection       "1; mode=block" always;

    error_page 502 503 504 /50x.html;
    location = /50x.html { root /usr/share/nginx/html; internal; }

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;
}