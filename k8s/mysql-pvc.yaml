apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-pvc
  namespace: transolux
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  # storageClassName: standard  # Uncomment and set for your cloud provider
  #   AWS EKS  → gp2 or gp3
  #   GKE      → standard or premium-rwo
  #   AKS      → managed-premium
  #   Minikube → standard (default)